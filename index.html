<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini ERP Lager</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding: 20px; background:#f4f4f4; }
.card { background:white; padding:10px; margin:10px 0; border-radius:8px; }
.bestill { color:red; font-weight:bold; }
button { padding:6px 10px; margin:3px; cursor:pointer; }
input { padding:6px; margin:5px; }
canvas { background:white; border-radius:8px; padding:10px; }
</style>

</head>

<body>

<h1>📦 Mini ERP Lager (LIVE)</h1>

<input id="search" placeholder="🔍 Søk vare..." oninput="render()">

<h3>➕ Legg til produkt</h3>
<input id="name" placeholder="Navn">
<input id="stock" placeholder="Start lager">
<input id="min" placeholder="Minimum">
<button onclick="addItem()">Legg til</button>
<button onclick="bulkImport()">Import varer</button>

<div id="app"></div>

<h3>📊 Lager</h3>
<canvas id="chartStock"></canvas>

<h3>📉 Historikk</h3>
<select id="historySelect" onchange="renderHistory()"></select>
<canvas id="chartHistory"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZYW2kj0E66NvGPLdIcTqBc4TgmuGWQkQ",
  authDomain: "minierp-dc40c.firebaseapp.com",
  projectId: "minierp-dc40c",
  storageBucket: "minierp-dc40c.firebasestorage.app",
  messagingSenderId: "470500148683",
  appId: "1:470500148683:web:ac8f1ff82296bee436e24e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🧠 DATA
let items = {};
let stockChart;
let historyChart;

// 🔄 SYNC
onSnapshot(doc(db, "erp", "shared"), (snap) => {
  if (snap.exists()) {
    items = snap.data().items || {};
  } else {
    items = {};
  }

  applyRealConsumption();
  render();
});

// 💾 SAVE
function save() {
  if (!items) return;
  setDoc(doc(db, "erp", "shared"), { items });
}

// ➕ ADD
window.addItem = function () {

  let n = document.getElementById("name").value;
  let s = parseFloat(document.getElementById("stock").value);
  let m = parseFloat(document.getElementById("min").value);

  if (!n) return;

  items[n] = {
    stock: s || 0,
    min: m || 0,
    usage: 1,
    lastOrder: 0,
    history: [],
    lastUpdate: Date.now()
  };

  save();
};

// 📦 BULK IMPORT
window.bulkImport = function () {

  const now = Date.now();

  items = {
    ...items,
    "Plaststrips (1342076)": { stock: 2000, min: 0, usage: 1, lastOrder: 0, history: [], lastUpdate: now },
    "16A EX STIKK (1501199)": { stock: 15, min: 0, usage: 1, lastOrder: 0, history: [], lastUpdate: now },
    "RKK 10mm2 (1010403)": { stock: 50, min: 0, usage: 1, lastOrder: 0, history: [], lastUpdate: now }
  };

  save();
};

// 📦 ORDER
window.order = function (name, force = false) {

  let item = items[name];

  let amount = item.min * 1.6 - item.stock;
  if (amount < 0) amount = 0;

  if (force) {
    amount = parseFloat(prompt("Hvor mye?")) || 0;
  }

  item.stock += amount;
  item.lastOrder = 0;

  save();
};

// ➖ ADJUST
window.adjust = function (name) {

  let val = parseFloat(prompt("Trekk fra:"));
  if (isNaN(val)) return;

  items[name].stock -= val;
  if (items[name].stock < 0) items[name].stock = 0;

  save();
};

// 🗑 DELETE
window.deleteItem = function (name) {
  delete items[name];
  save();
};

// 📊 CHART
function drawChart() {

  let labels = Object.keys(items);
  let data = labels.map(i => items[i].stock);

  if (stockChart) stockChart.destroy();

  stockChart = new Chart(document.getElementById("chartStock"), {
    type: "bar",
    data: {
      labels,
      datasets: [{ label: "Lager", data }]
    }
  });
}

// 📉 HISTORY
window.renderHistory = function () {

  let name = document.getElementById("historySelect").value;
  if (!items[name]) return;

  let hist = items[name].history || [];

  if (historyChart) historyChart.destroy();

  historyChart = new Chart(document.getElementById("chartHistory"), {
    type: "line",
    data: {
      labels: hist.map((_, i) => i),
      datasets: [{ label: name, data: hist }]
    }
  });
};

// 📺 RENDER UI
function render() {

  let q = document.getElementById("search").value.toLowerCase();

  let html = "";

  let keys = Object.keys(items);

  document.getElementById("historySelect").innerHTML =
    keys.map(i => `<option value="${i}">${i}</option>`).join("");

  for (let i of keys) {

    if (!i.toLowerCase().includes(q)) continue;

    let it = items[i];

    html += `
      <div class="card">
        <b>${i}</b><br>
        📦 ${Math.round(it.stock)}<br>
        📉 Min: ${it.min}<br>

        <button onclick="order('${i}')">Smart</button>
        <button onclick="order('${i}', true)">Manuell</button>
        <button onclick="adjust('${i}')">Justér</button>
        <button onclick="deleteItem('${i}')">Slett</button>
      </div>
    `;
  }

  document.getElementById("app").innerHTML = html;

  drawChart();
  renderHistory();
}

// ⏱ REAL CONSUMPTION (DIN FUNKSJON)
let lastRun = 0;

function applyRealConsumption(){

  let now = Date.now();

  if(now - lastRun < 5000) return;
  lastRun = now;

  for(let i in items){

    let item = items[i];

    if(!item.lastUpdate){
      item.lastUpdate = now;
    }

    let diffMs = now - item.lastUpdate;
    let days = diffMs / (1000 * 60 * 60 * 24);

    if(days > 0){

      let used = item.usage * days;

      item.stock -= used;
      if(item.stock < 0) item.stock = 0;

      item.lastOrder += days;

      item.lastUpdate = now;
    }
  }
}

// 🚀 START
render();

</script>

</body>
</html>

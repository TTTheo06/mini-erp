<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini ERP Lager</title>

  
<style>
body {
  font-family: system-ui, Arial;
  padding: 20px;
  background: #f1f5f9;
  color: #0f172a;
}

/* overskrifter */
h1 {
  font-size: 22px;
  margin-bottom: 10px;
  color: #1e3a8a;
}

h3 {
  margin-top: 20px;
  font-size: 15px;
  color: #334155;
}

/* inputs */
input, select {
  padding: 8px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #cbd5e1;
  font-size: 14px;
  background: white;
}

input:focus, select:focus {
  outline: none;
  border-color: #3b82f6;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
}

/* knapper */
button {
  padding: 5px 8px;
  margin: 2px;
  font-size: 12px;
  border-radius: 8px;
  border: none;
  background: #e2e8f0;
  color: #0f172a;
  cursor: pointer;
  transition: 0.15s;
}

button:hover {
  background: #cbd5e1;
}

/* hovedkort */
.card {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

/* lager tall */
.card b {
  color: #1e3a8a;
}

/* kritisk tekst */
.bestill {
  color: #dc2626;
  font-weight: 700;
}

/* kritisk boks */
.critical-box {
  background: #fee2e2;
  border: 1px solid #fecaca;
  padding: 10px;
  border-radius: 12px;
  margin: 10px 0;
}

/* canvas */
canvas {
  background: white;
  border-radius: 12px;
  padding: 10px;
  border: 1px solid #e2e8f0;
}

/* litt luft */
#app {
  margin-top: 10px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<h1>📦 Mini ERP Lager (LIVE)</h1>

<input id="search" placeholder="🔍 Søk vare..." oninput="render()">

<h3>➕ Legg til produkt</h3>
<input id="name" placeholder="Navn">
<input id="stock" placeholder="Start lager">
<input id="min" placeholder="Minimum">

<select id="unit">
  <option value="stk">stk</option>
  <option value="meter">meter</option>
</select>

<button onclick="addItem()">Legg til</button>

<div id="app"></div>

<h3>📊 Lager (nåværende)</h3>
<canvas id="chartStock"></canvas>

<h3>📉 Historisk utvikling</h3>
<select id="historySelect" onchange="renderHistory()"></select>
<canvas id="chartHistory"></canvas>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZYW2kj0E66NvGPLdIcTqBc4TgmuGWQkQ",
  authDomain: "minierp-dc40c.firebaseapp.com",
  projectId: "minierp-dc40c",
  storageBucket: "minierp-dc40c.firebasestorage.app",
  messagingSenderId: "470500148683",
  appId: "1:470500148683:web:ac8f1ff82296bee436e24e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🧠 DATA
let items = {};
let stockChart;
let historyChart;

// 🔄 LIVE SYNC FRA FIRESTORE
onSnapshot(doc(db, "erp", "shared"), (docSnap) => {

  if(docSnap.exists()){
    let data = docSnap.data();
    items = data.items || {};
  } else {
    items = {};
  }

  applyRealConsumption(); // ✅ riktig sted

  render();
});

// 💾 LAGRE TIL FIRESTORE
function save(){
   if(!items || Object.keys(items).length === 0){
    console.warn("⚠️ Stopper lagring av tom data");
    return;
  }
  setDoc(doc(db, "erp", "shared"), { items });
}

// ➕ legg til
window.addItem = function(){

  let n = document.getElementById("name").value;
  let s = parseFloat(document.getElementById("stock").value);
  let m = parseFloat(document.getElementById("min").value);

  if(!n) return;

 let u = document.getElementById("unit").value;

items[n] = {
  stock: s || 0,
  min: m || 0,
  usage: 1,
  unit: document.getElementById("unit").value, // 👈 NY
  lastOrder: 0,
  history: [],
  lastUpdate: Date.now()
};
  
  save();
}

// ⚙️ rediger
window.editItem = function(name){

  let item = items[name];

  let newMin = prompt("Nytt minimum:", item.min);
  let newUsage = prompt("Forbruk per dag:", item.usage);

  newMin = parseFloat(newMin);
  newUsage = parseFloat(newUsage);

  if(!isNaN(newMin)) item.min = newMin;
  if(!isNaN(newUsage)) item.usage = newUsage;

  save();
}

window.bulkImport = function(){

  const newItems = {
    "Plaststrips lange (1342076)": {
      stock: 2000,
      min: 0,
      usage: 1,
      lastOrder: 0,
      history: [],
      lastUpdate: new Date("2026-02-11").getTime()
    },

    "16A EX STIKK blå 6h (1501199)": {
      stock: 15,
      min: 0,
      usage: 1,
      lastOrder: 0,
      history: [],
      lastUpdate: new Date("2026-02-11").getTime()
    },

    "RKK 10mm2 BLÅ Dobbeiso A.T (1010403)": {
      stock: 50,
      min: 0,
      usage: 1,
      lastOrder: 0,
      history: [],
      lastUpdate: new Date("2026-03-12").getTime()
    },

    "RKK 1kV 16 SORT T&K (1050801)": {
      stock: 50,
      min: 0,
      usage: 1,
      lastOrder: 0,
      history: [],
      lastUpdate: new Date("2026-03-12").getTime()
    },

    "Kabelsko KRDIN 10mm² M10 (2016174)": {
      stock: 100,
      min: 0,
      usage: 1,
      lastOrder: 0,
      history: [],
      lastUpdate: new Date("2026-03-12").getTime()
    },

    "PRESSKABELSKO KRT 10mm2 M12 (2048615)": {
      stock: 100,
      min: 0,
      usage: 1,
      lastOrder: 0,
      history: [],
      lastUpdate: new Date("2026-03-12").getTime()
    },

    "Wago koblingsklemme 3 leder (1221963)": {
      stock: 120,
      min: 0,
      usage: 1,
      lastOrder: 0,
      history: [],
      lastUpdate: new Date("2026-03-12").getTime()
    }
  };

  // legg til i eksisterende items
  items = { ...items, ...newItems };

  save();
}
  

// 📦 bestilling
window.order = function(name, force=false){

  let item = items[name];

  let target = item.min * 1.6;
  let amount = target - item.stock;

  if(amount < 0) amount = 0;

  if(force){
    let manual = prompt("Hvor mye vil du bestille?");
    manual = parseFloat(manual);
    if(isNaN(manual)) return;
    amount = manual;
  }

  item.stock += amount;
  item.lastOrder = 0;

  save();
}

// ➖ juster
window.adjust = function(name){

  let val = prompt("Trekk fra lager:");
  val = parseFloat(val);

  if(isNaN(val)) return;

  items[name].stock -= val;
  if(items[name].stock < 0) items[name].stock = 0;

  save();
}
  window.deleteItem = function(name){

  let ok = confirm("Vil du slette " + name + "?");

  if(!ok) return;

  delete items[name];

  save();
}

// 🔄 simulering
function simulate(){

  for(let i in items){

    let base = items[i].usage;
    let variation = base * (0.7 + Math.random() * 0.6);

    items[i].stock -= variation;
    if(items[i].stock < 0) items[i].stock = 0;

    items[i].lastOrder++;

    if(!items[i].history) items[i].history = [];
    items[i].history.push(items[i].stock);

    if(items[i].history.length > 30){
      items[i].history.shift();
    }
  }

  save();
}

// 📌 sortering
function sortedKeys(){

  return Object.keys(items).sort((a,b)=>{

    let aCrit = items[a].stock <= items[a].min;
    let bCrit = items[b].stock <= items[b].min;

    if(aCrit !== bCrit){
      return bCrit - aCrit;
    }

    return items[a].stock - items[b].stock;
  });
}

// 📊 lager graf
function drawStockChart(){

  let labels = Object.keys(items);
  let data = labels.map(i => items[i].stock);

  if(stockChart) stockChart.destroy();

  stockChart = new Chart(document.getElementById("chartStock"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Lager",
        data,
        backgroundColor: "rgba(54, 162, 235, 0.6)"
      }]
    },
    options: { responsive:true, animation:false }
  });
}

// 📉 historisk graf
window.renderHistory = function(){

  let name = document.getElementById("historySelect").value;
  if(!name || !items[name]) return;

  let hist = items[name].history || [];

  if(historyChart) historyChart.destroy();

  historyChart = new Chart(document.getElementById("chartHistory"), {
    type: "line",
    data: {
      labels: hist.map((_,i)=>i),
      datasets: [{
        label: name,
        data: hist,
        borderColor: "red",
        fill: false
      }]
    }
  });
}

// 📺 render
function render(){
  
  let q = document.getElementById("search").value.toLowerCase();
  let html = "";

  let keys = sortedKeys();

  let select = document.getElementById("historySelect");
  select.innerHTML = Object.keys(items)
    .map(i => `<option value="${i}">${i}</option>`)
    .join("");

  let critical = Object.keys(items).filter(i => items[i].stock <= items[i].min);

  if(critical.length > 0){
    html += `
    <div class="card" style="border:2px solid red;">
      <h3>⚠️ KRITISKE VARER (${critical.length})</h3>
      <p>${critical.join(", ")}</p>
    </div>`;
  }

  for(let i of keys){

    if(!i.toLowerCase().includes(q)) continue;

    let it = items[i];
    let crit = it.stock <= it.min;

    html += `
    <div class="card">
      <b>${i}</b><br>
      📦 ${Math.round(it.stock)} ${it.unit || "stk"}
      📉 Min: ${it.min}<br>
      ⏱ ${it.lastOrder} dager siden<br>

      ${crit ? '<div class="bestill">🔴 BESTILL</div>' : ''}

      <button onclick="order('${i}')">📦 Smart</button>
      <button onclick="order('${i}', true)">🧾 Manuell</button>
      <button onclick="adjust('${i}')">➖ Juster</button>
      <button onclick="editItem('${i}')">⚙️ Rediger</button>
      <button onclick="deleteItem('${i}')">🗑 Slett</button>
    </div>`;
  }

  document.getElementById("app").innerHTML = html;

  drawStockChart();
  renderHistory();
}

let lastRun = 0;

function applyRealConsumption(){

  let now = Date.now();

  // 🧠 hindrer at den kjører flere ganger på rad
  if(now - lastRun < 5000) return;
  lastRun = now;

  for(let i in items){

    let item = items[i];

    if(!item.lastUpdate){
      item.lastUpdate = now;
    }

    let diffMs = now - item.lastUpdate;
    let days = diffMs / (1000 * 60 * 60 * 24);

    if(days > 0){

      let used = item.usage * days;

      item.stock -= used;
      if(item.stock < 0) item.stock = 0;

      item.lastOrder += days;

      item.lastUpdate = now;
    }
  }
}
</script>

</body>
</html>

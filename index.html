<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini ERP Lager</title>

<style>
body { font-family: Arial; padding: 20px; background:#f4f4f4; }
.card { background:white; padding:10px; margin:10px 0; border-radius:8px; }
.bestill { color:red; font-weight:bold; }
button { padding:6px 10px; margin:3px; cursor:pointer; }
input { padding:6px; margin:5px; }
canvas { background:white; border-radius:8px; padding:10px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>📦 Mini ERP Lager (LIVE)</h1>

<input id="search" placeholder="🔍 Søk vare..." oninput="render()">

<h3>➕ Legg til produkt</h3>
<input id="name" placeholder="Navn">
<input id="stock" placeholder="Start lager">
<input id="min" placeholder="Minimum">
<button onclick="addItem()">Legg til</button>
<button onclick="bulkImport()">Bulk Import</button>

<div id="app"></div>

<h3>📊 Lager</h3>
<canvas id="chartStock"></canvas>

<h3>📉 Historikk</h3>
<select id="historySelect" onchange="renderHistory()"></select>
<canvas id="chartHistory"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZYW2kj0E66NvGPLdIcTqBc4TgmuGWQkQ",
  authDomain: "minierp-dc40c.firebaseapp.com",
  projectId: "minierp-dc40c",
  storageBucket: "minierp-dc40c.firebasestorage.app",
  messagingSenderId: "470500148683",
  appId: "1:470500148683:web:ac8f1ff82296bee436e24e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let items = {};
let stockChart;
let historyChart;

// 🧠 lastUpdate stabilitet
let hasInitialized = false;

// ========================
// 🔄 FIRESTORE SYNC (FIXED)
// ========================
onSnapshot(doc(db, "erp", "shared"), (docSnap) => {

  if (docSnap.exists()) {
    items = docSnap.data().items || {};
  } else {
    items = {};
  }

  // 🔴 viktig: ikke spam-recalculate før første load
  if (!hasInitialized) {
    applyRealConsumption();
    hasInitialized = true;
  }

  render();
});

// ========================
// 💾 SAVE
// ========================
function save() {
  setDoc(doc(db, "erp", "shared"), { items });
}

// ========================
// ➕ ADD
// ========================
window.addItem = function () {

  let n = document.getElementById("name").value;
  let s = parseFloat(document.getElementById("stock").value);
  let m = parseFloat(document.getElementById("min").value);

  if (!n) return;

  items[n] = {
    stock: s || 0,
    min: m || 0,
    usage: 1,
    lastOrder: 0,
    history: [],
    lastUpdate: Date.now()
  };

  save();
};

// ========================
// 📦 BULK IMPORT (FIXED)
// ========================
window.bulkImport = function () {

  const newItems = {
    "Plaststrips (1342076)": {
      stock: 2000, min: 0, usage: 1, lastOrder: 0, history: [], lastUpdate: Date.now()
    },
    "Stikk blå 6h (1501199)": {
      stock: 15, min: 0, usage: 1, lastOrder: 0, history: [], lastUpdate: Date.now()
    },
    "RKK 10mm2 (1010403)": {
      stock: 50, min: 0, usage: 1, lastOrder: 0, history: [], lastUpdate: Date.now()
    }
  };

  items = { ...items, ...newItems };
  save();
};

// ========================
// ⚙️ EDIT
// ========================
window.editItem = function (name) {

  let item = items[name];

  let newMin = parseFloat(prompt("Nytt minimum:", item.min));
  let newUsage = parseFloat(prompt("Forbruk per dag:", item.usage));

  if (!isNaN(newMin)) item.min = newMin;
  if (!isNaN(newUsage)) item.usage = newUsage;

  save();
};

// ========================
// 📦 ORDER
// ========================
window.order = function (name, force = false) {

  let item = items[name];

  let amount = item.min * 1.6 - item.stock;
  if (amount < 0) amount = 0;

  if (force) {
    amount = parseFloat(prompt("Manuell mengde:"));
    if (isNaN(amount)) return;
  }

  item.stock += amount;
  item.lastOrder = 0;

  save();
};

// ========================
// ➖ ADJUST
// ========================
window.adjust = function (name) {

  let val = parseFloat(prompt("Trekk fra:"));
  if (isNaN(val)) return;

  items[name].stock -= val;
  if (items[name].stock < 0) items[name].stock = 0;

  save();
};

// ========================
// 🗑 DELETE
// ========================
window.deleteItem = function (name) {
  delete items[name];
  save();
};

// ========================
// ⏳ REAL CONSUMPTION (FIXED)
// ========================
let lastRun = 0;

function applyRealConsumption() {

  let now = Date.now();

  if (now - lastRun < 5000) return;
  lastRun = now;

  for (let i in items) {

    let item = items[i];

    if (!item.lastUpdate) item.lastUpdate = now;

    let days = (now - item.lastUpdate) / 86400000;

    if (days > 0) {
      let used = item.usage * days;

      item.stock -= used;
      if (item.stock < 0) item.stock = 0;

      item.lastOrder += days;

      item.lastUpdate = now;
    }
  }
}

// ========================
// 📊 SORT
// ========================
function sortedKeys() {
  return Object.keys(items).sort((a, b) => items[a].stock - items[b].stock);
}

// ========================
// 📺 RENDER (FIXED STRINGS)
// ========================
function render() {

  let q = document.getElementById("search").value.toLowerCase();
  let html = "";

  let keys = sortedKeys();

  let select = document.getElementById("historySelect");
  select.innerHTML = Object.keys(items)
    .map(i => `<option value="${i}">${i}</option>`)
    .join("");

  for (let i of keys) {

    if (!i.toLowerCase().includes(q)) continue;

    let it = items[i];

    html += `
      <div class="card">
        <b>${i}</b><br>
        📦 ${Math.round(it.stock)}<br>
        📉 Min: ${it.min}<br>

        <button onclick="order('${i}')">Order</button>
        <button onclick="adjust('${i}')">Juster</button>
        <button onclick="editItem('${i}')">Edit</button>
        <button onclick="deleteItem('${i}')">Slett</button>
      </div>
    `;
  }

  document.getElementById("app").innerHTML = html;
}

// ========================
// 📉 HISTORY (simple)
// ========================
window.renderHistory = function () {};

</script>

</body>
</html>
